# ------------------------------------------------------------------------------
# Simulator Overlay
#
# Adds simulator-specific configuration to vLLM deployments:
#   - --mode=${VLLM_SIM_MODE} arg on Decode (vllm-d) only — controls simulator
#     response mode (echo: returns input, random: returns random sentences)
#   - --zmq-endpoint on Decode only — publishes KV cache events to the EPP
#   - vLLM Render sidecar on all deployments (Decode, Prefill, Encode)
#   - KV cache args on Decode for cache-aware scheduling tests
#
# Uses JSON patches (op: add) to INSERT into args arrays without replacing
# them, avoiding conflicts with scenario-specific strategic merge patches.
#
# Usage: include as a Kustomize component in scenario overlays:
#   components:
#   - ../../../components/overlays/simulator/
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
# --- Decode deployment (vllm-d) ---
# Has initContainers (routing-sidecar), so insert tokenizer at index 0
- target:
    kind: Deployment
    name: vllm-d
  patch: |
    - op: add
      path: /spec/template/spec/containers/0/args/0
      value: "--mode=${VLLM_SIM_MODE}"
    - op: add
      path: /spec/template/spec/containers/0/args/1
      value: "--enable-kvcache=${KV_CACHE_ENABLED}"
    - op: add
      path: /spec/template/spec/containers/0/args/2
      value: "--kv-cache-size=1024"
    - op: add
      path: /spec/template/spec/containers/0/args/3
      value: "--block-size=16"
    - op: add
      path: /spec/template/spec/containers/0/args/4
      value: "--zmq-endpoint=tcp://${EPP_NAME}.${NAMESPACE}.svc.cluster.local:5557"
    - op: add
      path: /spec/template/spec/initContainers/0
      value:
        name: vllm-render
        image: ${VLLM_RENDER_IMAGE}
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        command: ["vllm"]
        args: ["launch", "render", "${MODEL_NAME}", "--port=8082"]
        env:
        - name: HF_TOKEN
          value: "${HF_TOKEN}"
        ports:
        - name: http
          containerPort: 8082
        startupProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 2
          periodSeconds: 1
          failureThreshold: 600
          timeoutSeconds: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          periodSeconds: 5
          failureThreshold: 1
          timeoutSeconds: 1
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
    - op: add
      path: /spec/template/spec/volumes/-
      value:
        name: model-cache
        emptyDir: {}
# --- Prefill and Encode deployments (vllm-p, vllm-e) ---
# initContainers: [] in base, so append with /-
- target:
    kind: Deployment
    name: "vllm-[pe]"
  patch: |
    - op: add
      path: /spec/template/spec/initContainers/-
      value:
        name: vllm-render
        image: ${VLLM_RENDER_IMAGE}
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        command: ["vllm"]
        args: ["launch", "render", "${MODEL_NAME}", "--port=8082"]
        env:
        - name: HF_TOKEN
          value: "${HF_TOKEN}"
        ports:
        - name: http
          containerPort: 8082
        startupProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 2
          periodSeconds: 1
          failureThreshold: 600
          timeoutSeconds: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          periodSeconds: 5
          failureThreshold: 1
          timeoutSeconds: 1
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
    - op: add
      path: /spec/template/spec/volumes/-
      value:
        name: model-cache
        emptyDir: {}

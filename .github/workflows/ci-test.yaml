name: CI - Test

on:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    # pull_request_target fires even when GITHUB_TOKEN creates the PR (e.g. the
    # release-notes bot). pull_request does not. We register pull_request_target
    # so bot-created PRs get a "skipped" conclusion that satisfies branch
    # protection, but we skip all real work: pull_request already covers human
    # PRs, and running twice would cause the concurrency group to cancel one run.
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**/*.go'
              - Dockerfile.*
              - Makefile*
              - go.mod
              - go.sum
              - scripts/**
              - .github/workflows/ci-test.yaml

  unit-and-integration:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Create Go cache dirs
        id: go-cache
        run: |
          mkdir -p "$HOME/.cache/llm-d-gomodcache" "$HOME/.cache/llm-d-gobuildcache"
          echo "mod=$HOME/.cache/llm-d-gomodcache" >> "$GITHUB_OUTPUT"
          echo "build=$HOME/.cache/llm-d-gobuildcache" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.go-cache.outputs.mod }}
            ${{ steps.go-cache.outputs.build }}
          key: go-cache-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-cache-

      # Restore the baseline saved from the last main push so the compare step
      # can diff against it. Missing cache (first PR ever) is not an error;
      # compare-coverage.sh reports all components as "new" and exits 0.
      - name: Restore main branch coverage baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: coverage/baseline
          key: coverage-main

      - name: Run unit tests
        shell: bash
        env:
          GO_MOD_CACHE_VOL: ${{ steps.go-cache.outputs.mod }}
          GO_BUILD_CACHE_VOL: ${{ steps.go-cache.outputs.build }}
        run: make test-unit

      - name: Run hermetic integration tests
        shell: bash
        env:
          GO_MOD_CACHE_VOL: ${{ steps.go-cache.outputs.mod }}
          GO_BUILD_CACHE_VOL: ${{ steps.go-cache.outputs.build }}
        run: make test-integration-hermetic

      - name: Compare coverage against main baseline
        if: github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        run: make coverage-compare BASELINE_DIR=coverage/baseline

      # Find the latest release-* branch (by SemVer) and download its coverage
      # artifact so the PR can compare against the most recent release.
      - name: Find latest release branch
        if: github.event_name == 'pull_request'
        id: find-releases
        shell: bash
        run: |
          gh api "repos/${{ github.repository }}/branches" \
            --paginate \
            --jq '[.[] | select(.name | startswith("release-")) | .name][]' \
            | sort -V | tail -1 > /tmp/release_branches.txt
          echo "Release branches found:"
          cat /tmp/release_branches.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download and compare release coverage baselines
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if [[ ! -s /tmp/release_branches.txt ]]; then
            echo "No release branches found, skipping."
            exit 0
          fi
          while IFS= read -r branch; do
            [[ -z "$branch" ]] && continue
            echo "Looking up latest successful run for branch: $branch"
            run_id=$(gh run list \
              --repo "${{ github.repository }}" \
              --branch "$branch" \
              --workflow "CI - Test" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [[ -z "$run_id" ]]; then
              echo "No successful run found for $branch, skipping."
              continue
            fi
            dest="coverage/release-baselines/$branch"
            mkdir -p "$dest"
            if gh run download "$run_id" \
                --repo "${{ github.repository }}" \
                --name "coverage-baseline-$branch" \
                --dir "$dest"; then
              make coverage-compare BASELINE_DIR="$dest" COVERAGE_LABEL="$branch"
            else
              echo "No coverage artifact for $branch in run $run_id, skipping."
            fi
          done < /tmp/release_branches.txt
        env:
          GH_TOKEN: ${{ github.token }}

      # Copy the freshly generated profiles into coverage/baseline so that
      # the saved path matches the restored path on future PR runs.
      - name: Stage coverage baseline for caching
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: bash
        run: |
          mkdir -p coverage/baseline
          cp coverage/*.out coverage/baseline/

      - name: Save coverage baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v5
        with:
          path: coverage/baseline
          key: coverage-main

      # Upload coverage profiles as a named artifact for release branches.
      # Retrieved by PRs to compare against the most recent release.
      - name: Upload coverage artifact (release branches)
        if: >-
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/release-')
        uses: actions/upload-artifact@v7
        with:
          name: coverage-baseline-${{ github.ref_name }}
          path: coverage/*.out
          retention-days: 400
          overwrite: true

  e2e-build:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Build e2e images
        uses: ./.github/actions/e2e-build
        with:
          commit-sha: ${{ github.sha }}

  e2e-gaie:
    needs: [check-changes, e2e-build]
    if: ${{ needs.check-changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      # Custom profile with directory-only removals (run in parallel, no apt).
      # The cleanup-profile: max is much more aggressive, it cleanups around 41GB,
      # but runs 3.5 mins
      - name: Free disk space
        uses: justinthelaw/maximize-github-runner-space@v0.9.0
        with:
          cleanup-profile: custom
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-cached-tools: 'true'
          remove-swift: 'true'
          remove-julia: 'true'
          remove-rust: 'true'
          remove-miniconda: 'true'
          swapfile-size: 0

      - name: Create Go cache dirs
        id: go-cache
        run: |
          mkdir -p "$HOME/.cache/llm-d-gomodcache" "$HOME/.cache/llm-d-gobuildcache"
          echo "mod=$HOME/.cache/llm-d-gomodcache" >> "$GITHUB_OUTPUT"
          echo "build=$HOME/.cache/llm-d-gobuildcache" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.go-cache.outputs.mod }}
            ${{ steps.go-cache.outputs.build }}
          key: go-cache-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-cache-

      - name: Build e2e images
        uses: ./.github/actions/e2e-build
        with:
          commit-sha: ${{ github.sha }}

      - name: Run make test-e2e-gaie
        shell: bash
        env:
          GO_MOD_CACHE_VOL: ${{ steps.go-cache.outputs.mod }}
          GO_BUILD_CACHE_VOL: ${{ steps.go-cache.outputs.build }}
        run: make test-e2e-gaie-run

  e2e-router:
    needs: [check-changes, e2e-build]
    if: ${{ needs.check-changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: pd
            label-filter: "!Disruptive && !Extended"
          - name: extended
            label-filter: "Extended"
          - name: disruption
            label-filter: "Disruptive"
    name: e2e-scheduler (${{ matrix.suite.name }})
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      # Custom profile with directory-only removals (run in parallel, no apt).
      # The cleanup-profile: max is much more aggressive, it cleanups around 41GB,
      # but runs 3.5 mins
      - name: Free disk space
        uses: justinthelaw/maximize-github-runner-space@v0.9.0
        with:
          cleanup-profile: custom
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-cached-tools: 'true'
          remove-swift: 'true'
          remove-julia: 'true'
          remove-rust: 'true'
          remove-miniconda: 'true'
          swapfile-size: 0

      - name: Create Go cache dirs
        id: go-cache
        run: |
          mkdir -p "$HOME/.cache/llm-d-gomodcache" "$HOME/.cache/llm-d-gobuildcache"
          echo "mod=$HOME/.cache/llm-d-gomodcache" >> "$GITHUB_OUTPUT"
          echo "build=$HOME/.cache/llm-d-gobuildcache" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.go-cache.outputs.mod }}
            ${{ steps.go-cache.outputs.build }}
          key: go-cache-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-cache-

      - name: Build e2e images
        uses: ./.github/actions/e2e-build
        with:
          commit-sha: ${{ github.sha }}

      - name: Run e2e-scheduler (${{ matrix.suite.name }})
        shell: bash
        env:
          GO_MOD_CACHE_VOL: ${{ steps.go-cache.outputs.mod }}
          GO_BUILD_CACHE_VOL: ${{ steps.go-cache.outputs.build }}
          E2E_LABEL_FILTER: ${{ matrix.suite.label-filter }}
        run: make test-e2e-scheduler-run

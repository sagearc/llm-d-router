name: Docker Build - ghcr
description: Build image using buildx. Supports pushing to a registry (multi-arch) or loading into the local Docker daemon (single-arch, for CI test use).
inputs:
  docker-file:
    required: true
    description: Dockerfile name
  image-name:
    required: true
    description: Image name
  tag:
    required: true
    description: Image tag
  registry:
    required: true
    description: Container registry (e.g., ghcr.io/llm-d)
  github-token:
    required: false
    description: GitHub token for registry login (required when load is false)
    default: ''
  prerelease:
    required: false
    description: indicates whether or not this is a pre-release (not a release) build
    default: 'false'
  load:
    required: false
    description: Load image into the local Docker daemon instead of pushing to the registry (single-arch, no login needed)
    default: 'false'
  commit-sha:
    required: false
    description: Git commit SHA to embed via COMMIT_SHA build arg
    default: ''
runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      if: inputs.load != 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Build image
      uses: docker/build-push-action@v6
      with:
        file: ${{ inputs.docker-file }}
        push: ${{ inputs.load != 'true' }}
        load: ${{ inputs.load == 'true' }}
        platforms: ${{ inputs.load != 'true' && 'linux/amd64,linux/arm64' || '' }}
        tags: |
          ${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.tag }}
          ${{ inputs.load != 'true' && inputs.prerelease != 'true' && format('{0}/{1}:latest', inputs.registry, inputs.image-name) || '' }}
        build-args: ${{ inputs.commit-sha != '' && format('COMMIT_SHA={0}', inputs.commit-sha) || '' }}
        cache-from: type=gha,scope=${{ inputs.image-name }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}
